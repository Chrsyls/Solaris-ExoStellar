<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Signal Lost | Solaris Exostellar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Manrope:wght@300;400;700&family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kMonolith: '#090909', 
                        kSolarisGlow: '#5D2A71', 
                        kDecoGold: '#D4AF37', 
                        kGothicVoid: '#110518', 
                        kAlertRed: '#8B0000',
                    },
                    fontFamily: {
                        sans: ['"Manrope"', 'sans-serif'],
                        display: ['"Space Grotesk"', 'sans-serif'], 
                        deco: ['"Cinzel"', 'serif'], 
                    },
                    animation: {
                        'pulse-gold': 'pulse-gold 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'spin-slow': 'spin 20s linear infinite',
                        'spin-reverse': 'spin-reverse 25s linear infinite',
                        'glitch': 'glitch 2s infinite',
                    },
                    keyframes: {
                        'pulse-gold': {
                            '0%, 100%': { opacity: '0.6', boxShadow: '0 0 20px 0px rgba(212, 175, 55, 0.1)' },
                            '50%': { opacity: '1', boxShadow: '0 0 40px 5px rgba(212, 175, 55, 0.4)' },
                        },
                        'spin-reverse': {
                            '0%': { transform: 'rotate(360deg)' },
                            '100%': { transform: 'rotate(0deg)' },
                        },
                        'glitch': {
                            '0%, 100%': { transform: 'translate(0)' },
                            '20%': { transform: 'translate(-2px, 2px)' },
                            '40%': { transform: 'translate(-2px, -2px)' },
                            '60%': { transform: 'translate(2px, 2px)' },
                            '80%': { transform: 'translate(2px, -2px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            /* Latar belakang Void / Deep Space */
            background-color: #020203;
            background-image: url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #EAEAEA;
            overflow: hidden; /* Mengunci scroll agar terasa seperti terjebak di terminal */
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, rgba(2, 2, 3, 0.9), rgba(17, 5, 24, 0.98)); 
            z-index: -1;
        }

        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(to right, rgba(139, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100px 100px; 
            z-index: -1;
            pointer-events: none;
        }

        .glass-nav {
            background: rgba(9, 9, 9, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(139, 0, 0, 0.3); 
        }

        .error-text {
            text-shadow: 4px 0px 0px rgba(139,0,0,0.8), -4px 0px 0px rgba(93,42,113,0.8);
        }

        .reveal { opacity: 0; transform: scale(0.95); transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .reveal.active { opacity: 1; transform: scale(1); }
    </style>
</head>
<body class="font-sans antialiased h-screen w-screen flex flex-col">
    <div class="grid-overlay"></div>

    <nav class="w-full flex justify-between items-center py-4 px-8 lg:px-20 z-50 glass-nav">
        <a href="index.html" class="flex items-center gap-4 group">
            <div class="w-4 h-4 bg-kAlertRed rotate-45 flex items-center justify-center animate-pulse group-hover:scale-110 transition-transform"></div>
            <span class="text-2xl font-deco font-bold tracking-[0.2em] text-white/50">Solaris</span>
        </a>
        <div class="text-[10px] font-display font-bold tracking-[0.4em] uppercase text-kAlertRed animate-pulse">
            System Warning
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center relative z-10 px-4">
        
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 flex items-center justify-center pointer-events-none opacity-40">
            <div class="w-[300px] h-[300px] md:w-[600px] md:h-[600px] rounded-full border border-kAlertRed/20 animate-spin-slow border-dashed"></div>
            <div class="absolute w-[200px] h-[200px] md:w-[450px] md:h-[450px] rounded-full border-2 border-kDecoGold/10 animate-spin-reverse border-dotted"></div>
            <div class="absolute w-[100px] h-[100px] md:w-[250px] md:h-[250px] rounded-full bg-kMonolith shadow-[0_0_100px_rgba(139,0,0,0.5)] border-4 border-[#111]"></div>
        </div>

        <div class="text-center reveal max-w-2xl relative z-20 bg-kMonolith/60 backdrop-blur-md p-10 md:p-16 border-y-2 border-kAlertRed/50 shadow-[0_0_50px_rgba(0,0,0,0.8)]">
            
            <div class="inline-block bg-kAlertRed text-white px-4 py-1 text-[10px] font-display font-black tracking-[0.3em] uppercase mb-8">
                Error Code: 404
            </div>
            
            <h1 class="text-7xl md:text-[9rem] font-deco font-black text-white mb-2 leading-none error-text animate-glitch">
                LOST
            </h1>
            <h2 class="text-2xl md:text-3xl font-deco italic text-kDecoGold mb-8">In The Void</h2>
            
            <p class="text-white/60 font-sans font-light text-sm md:text-base leading-relaxed mb-10 border-x-2 border-kDecoGold/20 px-6">
                The coordinates you entered do not exist within the Solaris Exostellar mainframe. You have drifted into uncharted space. Oxygen reserves are nominal, but navigation is offline.
            </p>
            
            <div class="flex flex-col sm:flex-row items-center justify-center gap-6">
                <a href="index.html" class="group relative px-10 py-4 bg-transparent border border-kDecoGold text-kDecoGold font-display font-bold text-[10px] tracking-[0.2em] uppercase hover:bg-kDecoGold hover:text-kMonolith transition-all shadow-[0_0_20px_rgba(212,175,55,0.1)]">
                    Recalibrate to Hub
                </a>
                <button onclick="window.history.back()" class="text-[10px] font-display font-bold tracking-[0.2em] uppercase text-white/50 hover:text-white transition-colors border-b border-transparent hover:border-white pb-1">
                    Reverse Trajectory
                </button>
            </div>

        </div>
    </main>

    <footer class="w-full py-6 bg-kMonolith/80 text-center border-t border-white/5 text-kAlertRed/50 text-[10px] uppercase tracking-[0.3em] font-display relative z-50">
        <p>Telemetry Failed &copy; 2046 Solaris Exostellar</p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                document.querySelectorAll('.reveal').forEach(el => el.classList.add('active'));
            }, 100); // Trigger animasi saat load
        });
    </script>
</body>
</html>
